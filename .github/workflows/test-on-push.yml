name: Tests
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-main:
    runs-on: ubuntu-latest
    steps:

      - name: Check out repository code
        uses: actions/checkout@v2
        
      # We need to downgrade Docker to v28 because ubuntu-latest has Docker v29, which is
      # not compatible with Fabric spanning chaincode images.
      # See https://github.com/actions/runner-images/issues/13474#issuecomment-3902397284
      - name: Downgrade Docker to v28
        uses: ./.github/actions/setup-docker-v28
          
      - name: Build Fablo
        run: |
          shellcheck --version && \
          yamllint -v && \
          ./fablo-build.sh

      - name: Test simple network
        run: e2e-network/docker/test-01-v3-simple.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-main
          path: |
            e2e-network/docker/test-01-v3-simple.sh.logs/*
            e2e-network/docker/test-01-v3-simple.sh.tmpdir/fablo-target/**/*

      - name: Test generators
        run: |
          npm run test:unit && \
          npm run test:e2e && \
          ./check-if-fablo-version-matches.sh

      - name: Lint
        run: npm run lint && ./lint.sh

  test-k8s:
    needs: test-main
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      KIND_CLUSTER: fablo-k8s-e2e
      KIND_VERSION: v0.31.0
      FABRICOPS_VERSION: v0.1.2
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2

      - name: Downgrade Docker to v28
        uses: ./.github/actions/setup-docker-v28

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26.0"

      - name: Install kind
        run: |
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind create cluster --name "${KIND_CLUSTER}" --wait 5m
          kubectl cluster-info

      - name: Install FabricOps
        run: |
          kubectl apply -f "https://github.com/dpereowei/FabricOps/releases/download/${FABRICOPS_VERSION}/install.yaml"
          kubectl rollout status deployment/fabricops-controller-manager -n fabricops-system --timeout=180s

      - name: Install fabricopsctl
        run: |
          go install "github.com/dpereowei/fabricops/cmd/fabricopsctl@${FABRICOPS_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Fablo
        run: |
          shellcheck --version && \
          yamllint -v && \
          npm install && \
          ./fablo-build.sh

      - name: Test Kubernetes network
        run: e2e-network/k8s/test-01-simple-k8s.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-k8s
          path: |
            e2e-network/k8s/test-01-simple-k8s.sh.logs/*
            e2e-network/k8s/test-01-simple-k8s.sh.tmpdir/fablo-target/**/*

      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER}" || true

  test-02-raft:
    needs: test-main
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2

      - name: Downgrade Docker to v28
        uses: ./.github/actions/setup-docker-v28

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Fablo
        run: |
          shellcheck --version && \
          yamllint -v && \
          npm install && \
          ./fablo-build.sh

      - name: Test RAFT network
        run: e2e-network/docker/test-02-v2-raft-2orgs.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-02-raft
          path: |
            e2e-network/docker/test-02-v2-raft-2orgs.sh.logs/*
            e2e-network/docker/test-02-v2-raft-2orgs.sh.tmpdir/fablo-target/**/*

  test-03-private-data:
    needs: test-main
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2

      - name: Downgrade Docker to v28
        uses: ./.github/actions/setup-docker-v28

      - name: Build Fablo
        run: |
          shellcheck --version && \
          yamllint -v && \
          npm install && \
