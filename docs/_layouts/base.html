<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
<link rel="icon" href="/assets/sygnet.png">
<style>
  :root{
    --bg:#0a0e14; --panel:#0d1117; --panel-2:#111722; --fg:#e6edf3; --muted:#8b949e;
    --line:#1f2630; --accent:#3fb950; --accent-2:#2ea043; --cyan:#56d4dd;
    --nav-h:64px; --sidebar-w:250px; --maxw:1180px;
    --mono:ui-monospace,SFMono-Regular,"JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);color:var(--fg);background:var(--bg);line-height:1.65;-webkit-font-smoothing:antialiased}
  a{color:var(--cyan);text-decoration:none}
  a:hover{text-decoration:underline}
  code{font-family:var(--mono);font-size:.88em;background:var(--panel-2);color:#c9d7e5;padding:.15em .42em;border-radius:5px;border:1px solid var(--line)}
  pre{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px;overflow:auto}
  pre code{background:none;padding:0;border:0}
  /* nav */
  .nav{position:sticky;top:0;z-index:50;height:var(--nav-h);display:flex;align-items:center;gap:24px;
    padding:0 28px;background:rgba(10,14,20,.8);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav .brand{display:flex;align-items:center;gap:9px}
  .nav .brand img{height:30px;width:30px;display:block;filter:invert(1)}
  .nav .brand span{font-family:var(--mono);font-weight:700;font-size:1.15rem;letter-spacing:-.01em;color:var(--fg)}
  .nav .links{margin-left:auto;display:flex;gap:22px;align-items:center}
  .nav .links a{color:var(--muted);font-weight:500;font-size:.92rem}
  .nav .links a:hover{color:var(--fg);text-decoration:none}
  .nav .cta{font-family:var(--mono);background:var(--accent);color:#04140a !important;padding:8px 15px;border-radius:8px;font-weight:700;font-size:.88rem}
  .nav .cta:hover{background:#4ade80}
  /* sidebar layout */
  .shell{max-width:var(--maxw);margin:0 auto;display:flex;gap:48px;padding:0 28px}
  .sidebar{width:var(--sidebar-w);flex:0 0 var(--sidebar-w);padding:34px 0;position:sticky;top:var(--nav-h);align-self:flex-start;height:calc(100vh - var(--nav-h));overflow:auto}
  .sidebar h4{font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:22px 0 8px}
  .sidebar a{display:block;color:#adbac7;padding:6px 12px;border-radius:7px;font-size:.92rem}
  .sidebar a:hover{background:var(--panel-2);text-decoration:none}
  .sidebar a.active{background:rgba(63,185,80,.12);color:var(--accent);font-weight:600}
  .content{flex:1;min-width:0;padding:34px 0 80px;max-width:820px}
  .content h1{font-size:2.1rem;letter-spacing:-.02em;margin:.2em 0 .5em}
  .content h2{font-size:1.42rem;margin:1.8em 0 .5em;padding-top:.5em;border-top:1px solid var(--line)}
  .content h3{font-size:1.14rem;margin:1.4em 0 .4em}
  .content a{color:var(--cyan)}
  .content table{border-collapse:collapse;width:100%;margin:1em 0;font-size:.9rem}
  .content th,.content td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
  .content th{background:var(--panel-2);font-weight:600}
  .content blockquote{border-left:3px solid var(--accent);margin:1em 0;padding:.2em 1em;color:var(--muted)}
  /* hero */
  .hero{border-bottom:1px solid var(--line);
    background:radial-gradient(900px 380px at 82% -10%,rgba(63,185,80,.10),transparent 60%),var(--bg);
    padding:68px 28px 60px}
  .hero-in{max-width:var(--maxw);margin:0 auto;display:flex;gap:52px;align-items:center;flex-wrap:wrap}
  .hero-text{flex:1;min-width:330px}
  .eyebrow{font-family:var(--mono);display:inline-block;font-size:.8rem;font-weight:600;color:var(--accent);
    background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.28);padding:5px 12px;border-radius:999px;margin-bottom:20px}
  .hero h1{font-size:3rem;line-height:1.06;letter-spacing:-.03em;margin:0 0 18px;font-weight:800}
  .hero h1 .mono{font-family:var(--mono);color:var(--accent);font-weight:700}
  .hero p{font-size:1.2rem;color:#aeb9c4;max-width:540px;margin:0 0 28px}
  .btn{display:inline-block;font-family:var(--mono);padding:12px 20px;border-radius:9px;font-weight:600;font-size:.95rem}
  .btn-primary{background:var(--accent);color:#04140a !important}
  .btn-primary:hover{background:#4ade80;text-decoration:none}
  .btn-ghost{border:1px solid var(--line);color:var(--fg) !important;margin-left:10px;background:var(--panel)}
  .btn-ghost:hover{border-color:#3a4657;text-decoration:none}
  /* terminal window */
  .term{flex:0 0 430px;max-width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.55)}
  .term-bar{display:flex;align-items:center;gap:7px;padding:11px 14px;background:var(--panel-2);border-bottom:1px solid var(--line)}
  .term-bar i{width:11px;height:11px;border-radius:50%;display:block}
  .term-bar .r{background:#ff5f56}.term-bar .y{background:#ffbd2e}.term-bar .g{background:#27c93f}
  .term-bar span{margin-left:8px;font-family:var(--mono);font-size:.78rem;color:var(--muted)}
  .term-body{padding:16px 18px;font-family:var(--mono);font-size:.85rem;line-height:1.9;white-space:pre-wrap;color:#c9d7e5}
  .term-body .p{color:var(--accent)}
  .term-body .ok{color:#7ee787}
  .term-body .dim{color:var(--muted)}
  .term-body .cur{display:inline-block;width:8px;height:15px;background:var(--accent);vertical-align:-2px;animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  /* feature chips */
  .features{max-width:var(--maxw);margin:0 auto;padding:34px 28px 0;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  .chip{font-family:var(--mono);font-size:.82rem;color:#adbac7;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 13px}
  .chip b{color:var(--accent)}
  /* home body */
  .home-body{max-width:var(--maxw);margin:0 auto;padding:46px 28px 40px}
  .home-body h2{font-size:1.55rem;letter-spacing:-.02em}
  .home-body p{color:#aeb9c4}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:22px}
  .card{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:20px 22px;transition:border-color .15s,transform .15s}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);text-decoration:none}
  .card h3{font-family:var(--mono);margin:.1em 0 .4em;font-size:1rem;color:var(--fg)}
  .card p{color:var(--muted);margin:0;font-size:.92rem}
  /* footer */
  .foot{border-top:1px solid var(--line);background:var(--panel)}
  .foot-in{max-width:var(--maxw);margin:0 auto;padding:26px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .foot img{height:34px;width:34px;filter:invert(1)}
  .foot .who{font-size:.88rem;color:var(--muted)}
  .foot .who b{color:var(--fg)}
  .foot .flinks{margin-left:auto;display:flex;gap:20px;font-size:.88rem}
  @media(max-width:820px){.sidebar{display:none}.hero h1{font-size:2.2rem}.term{flex-basis:100%}}
</style>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/"><img src="/assets/sygnet.png" alt=""><span>fablo</span></a>
    <div class="links">
      <a href="/reference/configuration.html">Reference</a>
      <a href="/editor.html">Config editor</a>
      <a href="https://github.com/hyperledger-labs/fablo">GitHub</a>
      <a class="cta" href="/getting-started.html">Get started</a>
    </div>
  </nav>
  {{ content }}
  <footer class="foot">
    <div class="foot-in">
      <img src="/assets/sygnet.png" alt="">
      <div class="who"><b>Fablo</b> — a Hyperledger Labs project, licensed Apache-2.0.</div>
      <div class="flinks">
        <a href="https://github.com/hyperledger-labs/fablo">GitHub</a>
        <a href="https://github.com/hyperledger-labs/fablo/blob/main/LICENSE">License</a>
        <a href="/editor.html">Config editor</a>
      </div>
    </div>
  </footer>
</body>
</html>
