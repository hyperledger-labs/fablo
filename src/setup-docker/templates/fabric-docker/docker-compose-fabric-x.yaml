<%# ============================================ %>
<%# Fabric-X Docker Compose Template            %>
<%# Generated by Fablo — Fabric-X Engine        %>
<%# ============================================ %>
networks:
  fabric-x:

services:

  <%# ================================= %>
  <%# Fabric CA (reused from classic)    %>
  <%# ================================= %>
<% orgs.forEach(function(org){ %>
  <%= org.ca.address %>:
    container_name: <%= org.ca.address %>
    image: ${FABRIC_CA_IMAGE}
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=<%= org.ca.address %>
      - FABRIC_CA_SERVER_CA_CERTFILE=/etc/hyperledger/fabric-ca-server/crypto/ca.<%= org.domain %>-cert.pem
      - FABRIC_CA_SERVER_CA_KEYFILE=/etc/hyperledger/fabric-ca-server/crypto/priv-key.pem
      - FABRIC_LOGGING_SPEC=${LOGGING_LEVEL}
    ports:
      - <%= org.ca.exposePort %>:<%= org.ca.port %>
    working_dir: /etc/hyperledger/fabric-ca-server
    command: sh -c 'fabric-ca-server start -b ${<%= org.ca.caAdminNameVar %>}:${<%= org.ca.caAdminPassVar %>} -d'
    volumes:
      - ../fabric-config/crypto-config/peerOrganizations/<%= org.domain %>/ca/:/etc/hyperledger/fabric-ca-server/crypto
    networks:
      - fabric-x

<% }) %>
  <%# ========================================= %>
  <%# Fabric-X Orderer: Router(s)               %>
  <%# Accepts txns, dispatches to batchers      %>
  <%# ========================================= %>
<% global.fabricX.routers.forEach(function(router){ %>
  <%= router.containerName %>:
    container_name: <%= router.containerName %>
    image: ${FABRIC_X_ORDERER_IMAGE}
    environment:
      - FABRIC_X_COMPONENT=router
      - FABRIC_X_ROUTER_LISTEN_ADDRESS=0.0.0.0:<%= router.port %>
      - FABRIC_LOGGING_SPEC=${LOGGING_LEVEL}
      - FABRIC_X_ROUTER_ID=<%= router.name %>
      # Metrics
      - FABRIC_X_OPERATIONS_LISTEN_ADDRESS=0.0.0.0:9443
      - FABRIC_X_METRICS_PROVIDER=prometheus
    ports:
      - <%= router.port %>:<%= router.port %>
      - <%= router.port + 1000 %>:9443
    networks:
      - fabric-x

<% }) %>
  <%# ========================================= %>
  <%# Fabric-X Orderer: Batcher(s)              %>
  <%# Bundles transactions into batches, sharded %>
  <%# ========================================= %>
<% global.fabricX.batchers.forEach(function(batcher){ %>
  <%= batcher.containerName %>:
    container_name: <%= batcher.containerName %>
    image: ${FABRIC_X_ORDERER_IMAGE}
    environment:
      - FABRIC_X_COMPONENT=batcher
      - FABRIC_X_BATCHER_LISTEN_ADDRESS=0.0.0.0:<%= batcher.port %>
      - FABRIC_LOGGING_SPEC=${LOGGING_LEVEL}
      - FABRIC_X_BATCHER_ID=<%= batcher.name %>
      # Metrics
      - FABRIC_X_OPERATIONS_LISTEN_ADDRESS=0.0.0.0:9443
      - FABRIC_X_METRICS_PROVIDER=prometheus
    ports:
      - <%= batcher.port %>:<%= batcher.port %>
      - <%= batcher.port + 1000 %>:9443
    networks:
      - fabric-x

<% }) %>
  <%# ========================================= %>
  <%# Fabric-X Orderer: Consenter(s)            %>
  <%# Runs Arma BFT consensus                  %>
  <%# ========================================= %>
<% global.fabricX.consenters.forEach(function(consenter){ %>
  <%= consenter.containerName %>:
    container_name: <%= consenter.containerName %>
    image: ${FABRIC_X_ORDERER_IMAGE}
    environment:
      - FABRIC_X_COMPONENT=consenter
      - FABRIC_X_CONSENTER_LISTEN_ADDRESS=0.0.0.0:<%= consenter.port %>
      - FABRIC_LOGGING_SPEC=${LOGGING_LEVEL}
      - FABRIC_X_CONSENTER_ID=<%= consenter.name %>
      # Metrics
      - FABRIC_X_OPERATIONS_LISTEN_ADDRESS=0.0.0.0:9443
      - FABRIC_X_METRICS_PROVIDER=prometheus
    ports:
      - <%= consenter.port %>:<%= consenter.port %>
      - <%= consenter.port + 1000 %>:9443
    networks:
      - fabric-x

<% }) %>
  <%# ========================================= %>
  <%# Fabric-X Orderer: Assembler(s)            %>
  <%# Creates ordered ledger of blocks          %>
  <%# ========================================= %>
<% global.fabricX.assemblers.forEach(function(assembler){ %>
  <%= assembler.containerName %>:
    container_name: <%= assembler.containerName %>
    image: ${FABRIC_X_ORDERER_IMAGE}
    environment:
      - FABRIC_X_COMPONENT=assembler
      - FABRIC_X_ASSEMBLER_LISTEN_ADDRESS=0.0.0.0:<%= assembler.port %>
      - FABRIC_LOGGING_SPEC=${LOGGING_LEVEL}
      - FABRIC_X_ASSEMBLER_ID=<%= assembler.name %>
      # Metrics
      - FABRIC_X_OPERATIONS_LISTEN_ADDRESS=0.0.0.0:9443
      - FABRIC_X_METRICS_PROVIDER=prometheus
    ports:
      - <%= assembler.port %>:<%= assembler.port %>
      - <%= assembler.port + 1000 %>:9443
    networks:
      - fabric-x

<% }) %>
  <%# ========================================= %>
  <%# Fabric-X Committer Stack                   %>
  <%# Each committer is a set of 5 microservices %>
  <%# ========================================= %>
<% global.fabricX.committers.forEach(function(committer){ %>
  <%# --- Sidecar: Orderer ↔ Coordinator middleware --- %>
  <%= committer.sidecar.containerName %>:
    container_name: <%= committer.sidecar.containerName %>
    image: ${FABRIC_X_COMMITTER_IMAGE}
    environment:
      - FABRIC_X_COMPONENT=sidecar
      - FABRIC_X_SIDECAR_LISTEN_ADDRESS=0.0.0.0:<%= committer.sidecar.port %>
      - FABRIC_LOGGING_SPEC=${LOGGING_LEVEL}
      - FABRIC_X_COMMITTER_ORG_MSP=<%= committer.orgName %>MSP
      # Metrics
      - FABRIC_X_OPERATIONS_LISTEN_ADDRESS=0.0.0.0:9443
      - FABRIC_X_METRICS_PROVIDER=prometheus
    ports:
      - <%= committer.sidecar.port %>:<%= committer.sidecar.port %>
    networks:
      - fabric-x

  <%# --- Coordinator: Orchestrates validation pipeline --- %>
  <%= committer.coordinator.containerName %>:
    container_name: <%= committer.coordinator.containerName %>
    image: ${FABRIC_X_COMMITTER_IMAGE}
    environment:
      - FABRIC_X_COMPONENT=coordinator
      - FABRIC_X_COORDINATOR_LISTEN_ADDRESS=0.0.0.0:<%= committer.coordinator.port %>
      - FABRIC_LOGGING_SPEC=${LOGGING_LEVEL}
      - FABRIC_X_COMMITTER_ORG_MSP=<%= committer.orgName %>MSP
      # Metrics
      - FABRIC_X_OPERATIONS_LISTEN_ADDRESS=0.0.0.0:9443
      - FABRIC_X_METRICS_PROVIDER=prometheus
    ports:
      - <%= committer.coordinator.port %>:<%= committer.coordinator.port %>
    networks:
      - fabric-x

  <%# --- Validator-Committer: OCC + commit --- %>
  <%= committer.validatorCommitter.containerName %>:
    container_name: <%= committer.validatorCommitter.containerName %>
    image: ${FABRIC_X_COMMITTER_IMAGE}
    environment:
      - FABRIC_X_COMPONENT=validator-committer
      - FABRIC_X_VC_LISTEN_ADDRESS=0.0.0.0:<%= committer.validatorCommitter.port %>
      - FABRIC_LOGGING_SPEC=${LOGGING_LEVEL}
      - FABRIC_X_COMMITTER_ORG_MSP=<%= committer.orgName %>MSP
      # Metrics
      - FABRIC_X_OPERATIONS_LISTEN_ADDRESS=0.0.0.0:9443
      - FABRIC_X_METRICS_PROVIDER=prometheus
    ports:
      - <%= committer.validatorCommitter.port %>:<%= committer.validatorCommitter.port %>
    networks:
      - fabric-x

  <%# --- Verification Service: Signature validation --- %>
  <%= committer.verificationService.containerName %>:
    container_name: <%= committer.verificationService.containerName %>
    image: ${FABRIC_X_COMMITTER_IMAGE}
    environment:
      - FABRIC_X_COMPONENT=verification
      - FABRIC_X_VERIFICATION_LISTEN_ADDRESS=0.0.0.0:<%= committer.verificationService.port %>
      - FABRIC_LOGGING_SPEC=${LOGGING_LEVEL}
      - FABRIC_X_COMMITTER_ORG_MSP=<%= committer.orgName %>MSP
      # Metrics
      - FABRIC_X_OPERATIONS_LISTEN_ADDRESS=0.0.0.0:9443
      - FABRIC_X_METRICS_PROVIDER=prometheus
    ports:
      - <%= committer.verificationService.port %>:<%= committer.verificationService.port %>
    networks:
      - fabric-x

  <%# --- Query Service: Read-only state access --- %>
  <%= committer.queryService.containerName %>:
    container_name: <%= committer.queryService.containerName %>
    image: ${FABRIC_X_COMMITTER_IMAGE}
    environment:
      - FABRIC_X_COMPONENT=query
      - FABRIC_X_QUERY_LISTEN_ADDRESS=0.0.0.0:<%= committer.queryService.port %>
      - FABRIC_LOGGING_SPEC=${LOGGING_LEVEL}
      - FABRIC_X_COMMITTER_ORG_MSP=<%= committer.orgName %>MSP
      # Metrics
      - FABRIC_X_OPERATIONS_LISTEN_ADDRESS=0.0.0.0:9443
      - FABRIC_X_METRICS_PROVIDER=prometheus
    ports:
      - <%= committer.queryService.port %>:<%= committer.queryService.port %>
    networks:
      - fabric-x

<% }) %>
